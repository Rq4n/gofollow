version: "2"
sql:
  - engine: "postgresql"
    queries: "sql/query/"
    schema: "migrations/"
    gen:
      go:
        package: "repository"
        out: "internal/repository"
        sql_package: "pgx/v5"
        emit_interface: true
        overrides:
          - db_type: "uuid"
            go_type: "github.com/google/uuid.UUID"
          - db_type: "uuid"
            nullable: true
            go_type: "github.com/google/uuid.UUID"
          - db_type: "date"
            go_type: "time.Time"
          - db_type: "date"
            nullable: true
            go_type: "time.Time"
          - db_type: "timestamp"
            nullable: true
            go_type: "time.Time"
